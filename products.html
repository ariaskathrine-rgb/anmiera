<!DOCTYPE html>
<html>
<head>
<title>Products</title>

<style>
body{margin:0;background:#0a0a0a;color:#fff;font-family:Arial;}

.nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
border-bottom:1px solid #222;
}

.nav img{height:45px;cursor:pointer;}

.nav a{
color:gold;
text-decoration:none;
margin-left:10px;
border:1px solid gold;
padding:6px 10px;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
padding:30px;
}

.card{
background:#111;
border:1px solid #222;
padding:15px;
}

.card img{
width:100%;
height:180px;
object-fit:cover;
}

button{
width:100%;
padding:10px;
border:1px solid gold;
background:transparent;
color:gold;
cursor:pointer;
margin-top:5px;
}

/* CART */
.cart{
position:fixed;
right:-320px;
top:0;
width:300px;
height:100%;
background:#111;
padding:20px;
transition:0.3s;
}

.cart.open{right:0;}

.footer{
text-align:center;
padding:25px;
border-top:1px solid #222;
color:#777;
}
</style>

</head>

<body>

<div class="nav">
    <a href="index.html"><img src="logo.png"></a>

    <div>
        <a href="about.html">About</a>
        <a href="products.html">Products</a>
        <a href="javascript:void(0)" onclick="toggleCart()">Cart</a>
        <a href="https://www.facebook.com/anmieraperfume/" target="_blank">Facebook</a>
    </div>
</div>

<h2 style="text-align:center;">Available Scents</h2>
<p style="text-align:center;">₱299 | 50mL</p>

<div class="products">

<script>

let items=[
"Happy Bloom","Libre Muse","Valaya Essence","Cloud Touch",
"Meow Bliss","Rouge Aura","Coco Elegance","Good Girl Noir",
"Lacoste Black","Lacoste White","Lacoste Red","Dylan Purple",
"Pear Essence","Polo Sport","Eros Flame","Amethyste Glow"
];

document.write(
items.map(i=>`
<div class="card">
<img src="bottle.jpg">
<h3>${i}</h3>
<button onclick="add('${i}')">Add</button>
<button onclick="removeItem('${i}')">Remove</button>
</div>
`).join("")
);

</script>

</div>

<!-- CART -->
<div class="cart" id="cart">
<h3>Your Cart</h3>
<div id="items"></div>
<h4>Total: ₱<span id="total">0</span></h4>
<button onclick="checkout()">Checkout</button>
</div>

<div class="footer">© 2026 Anmiera Perfume</div>

<script>

let cart={};
let price=299;

function add(name){
cart[name]=(cart[name]||0)+1;
update();
}

function removeItem(name){
if(cart[name]){
cart[name]--;
if(cart[name]<=0) delete cart[name];
}
update();
}

function update(){
let items=document.getElementById("items");
items.innerHTML="";
let total=0;

for(let n in cart){
let t=cart[n]*price;
total+=t;

items.innerHTML+=`
<p>
${n} x${cart[n]} = ₱${t}
</p>`;
}

document.getElementById("total").innerText=total;
}

function toggleCart(){
document.getElementById("cart").classList.toggle("open");
}

function checkout(){
let msg="Order:\n";
let total=0;

for(let n in cart){
msg+=`${n} x${cart[n]}\n`;
total+=cart[n]*price;
}

msg+="Total ₱"+total;

window.open("https://wa.me/639952525228?text="+encodeURIComponent(msg));
}

</script>

</body>
</html>
